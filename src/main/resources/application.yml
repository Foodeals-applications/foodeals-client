spring:
  config:
    import: file:.env[.properties]
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        transport:
          protocol: smtp
        smtp:
          auth: true
          starttls:
            enable: true
  application:
    name: Foodeals Client
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
          time_zone: UTC
        type:
          preferred-instant-jdbc-type: TIMESTAMP
          jsonb:
            allow: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  security:
    jwt:
      secret-key: ${APP_SECURITY_JWT_SECRET_KEY}
      # 1 day
      expiration: 86400000
      refresh-token:
        # 7 days
        expiration: 604800000

servlet:
  multipart:
    enabled: true
    max-file-size: 10MB
    max-request-size: 10MB

user:
  dir: C:/Users/nasri/eclipse-workspace/Foodeals-pro/foodeals-pro-api/
upload:

  directory:
    photos


web:
  resources:
    static-locations: file:${user.dir}/${upload.directory}/


  security:
    oauth2:
      client:
        registration:
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID}
            client-secret: ${FACEBOOK_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/facebook"
            scope: email,public_profile
        provider:
          facebook:
            authorization-uri: https://www.facebook.com/v17.0/dialog/oauth
            token-uri: https://graph.facebook.com/v17.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/me?fields=id,name,email,picture
